name: SMC Signals

# Repo publiczne = nielimitowane minuty. Harmonogram GitHuba bywa dostarczany z
# WIELOGODZINNYM opoznieniem lub wcale, wiec NIE liczymy na punktualnosc: kazdy
# trigger uruchamia DLUGA petle (~3h, skan co 5 min), a triggery sa rozlozone co
# ~2.5h przez caly dzien handlowy. Dzieki temu nawet rzadkie/spoznione starty i
# tak pokrywaja killzony. Killzone UTC (lato): London 07-08, NY AM 14-15, NY PM 18-19.
on:
  schedule:
    - cron: "20 6 * * 1-5"
    - cron: "50 8 * * 1-5"
    - cron: "20 11 * * 1-5"
    - cron: "50 13 * * 1-5"
    - cron: "20 16 * * 1-5"
    - cron: "50 18 * * 1-5"
  workflow_dispatch:
    inputs:
      petla_min:
        description: "Ile minut petli (0 = jeden skan, do testu)"
        default: "180"
      test_tg:
        description: "1 = wyslij wiadomosc testowa na Telegram"
        default: "0"

permissions:
  contents: write

concurrency:
  group: smc-signals
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalacja zaleznosci
        run: pip install -r requirements.txt

      - name: Bot - petla co 5 min przez okno killzone
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TF: "5m"
          TG_TEST: ${{ github.event.inputs.test_tg }}
        run: |
          set +e
          git config user.name "smc-bot"
          git config user.email "bot@users.noreply.github.com"
          MIN="${{ github.event.inputs.petla_min }}"
          [ -z "$MIN" ] && MIN=180
          KONIEC=$(( $(date +%s) + MIN*60 ))
          while true; do
            echo "--- skan $(date -u +%H:%M:%S) UTC (petla do +${MIN}min) ---"
            python smc_bot.py
            # zapisz stan tylko gdy sie zmienil (dedup przetrwa nawet gdy job sie urwie)
            git add state.json sygnaly_log.csv run_stats.json wyniki.json
            if ! git diff --cached --quiet; then
              git commit -m "update state + log sygnalow" && git push || echo "push nieudany"
            fi
            [ "$(date +%s)" -ge "$KONIEC" ] && break
            sleep 300
          done

      # LANCUCH: kazdy bieg na koncu odpala nastepny (workflow_dispatch tokenem
      # z sekretu - GITHUB_TOKEN ma blokade rekurencji). Dzieki temu bot dziala
      # 24/7 niezaleznie od zawodnego harmonogramu GitHuba (crony zostaja jako
      # awaryjne re-startery). Aby ZATRZYMAC lancuch: usun sekret DISPATCH_TOKEN
      # albo wylacz workflow w zakladce Actions.
      - name: Lancuch - odpal nastepny bieg
        if: always()
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then echo "brak DISPATCH_TOKEN - lancuch wylaczony"; exit 0; fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/signals.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "lancuch: dispatch HTTP $code"
