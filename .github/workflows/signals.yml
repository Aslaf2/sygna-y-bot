name: SMC Signals

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smc-signals
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalacja zaleznosci
        run: pip install -r requirements.txt
      - name: Uruchom bota
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TF: "5m"
          DIAG: "1"
        run: python smc_bot.py
      - name: Zapisz stan
        run: |
          git config user.name "smc-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git commit -m "update state" || echo "brak zmian"
          git push || echo "nic do wyslania"
