name: SMC Signals

# Repo publiczne = nielimitowane minuty. Zamiast liczyc na cron "*/5" (GitHub go
# dlawi i odpala 2-3x/dzien), startujemy job przy kazdej killzone i PETLIMY w nim
# co 5 min przez cale okno - niezaleznie od opoznien harmonogramu GitHuba.
# Killzone (czas NY): London 03-04, NY AM 10-11, NY PM 14-15.
# W UTC (lato/EDT): 07-08, 14-15, 18-19. Startujemy ~10 min wczesniej + backup.
on:
  schedule:
    - cron: "50 6 * * 1-5"    # London KZ (07-08 UTC) - primary
    - cron: "15 7 * * 1-5"    # London KZ - backup gdyby primary przepadl
    - cron: "50 13 * * 1-5"   # NY AM KZ (14-15 UTC) - primary
    - cron: "15 14 * * 1-5"   # NY AM KZ - backup
    - cron: "50 17 * * 1-5"   # NY PM KZ (18-19 UTC) - primary
    - cron: "15 18 * * 1-5"   # NY PM KZ - backup
  workflow_dispatch:
    inputs:
      petla_min:
        description: "Ile minut petli (0 = jeden skan, do testu)"
        default: "75"

permissions:
  contents: write

concurrency:
  group: smc-signals
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalacja zaleznosci
        run: pip install -r requirements.txt

      - name: Bot - petla co 5 min przez okno killzone
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TF: "5m"
        run: |
          set +e
          git config user.name "smc-bot"
          git config user.email "bot@users.noreply.github.com"
          MIN="${{ github.event.inputs.petla_min }}"
          [ -z "$MIN" ] && MIN=75
          KONIEC=$(( $(date +%s) + MIN*60 ))
          while true; do
            echo "--- skan $(date -u +%H:%M:%S) UTC (petla do +${MIN}min) ---"
            python smc_bot.py
            # zapisz stan tylko gdy sie zmienil (dedup przetrwa nawet gdy job sie urwie)
            git add state.json
            if ! git diff --cached --quiet; then
              git commit -m "update state" && git push || echo "push nieudany"
            fi
            [ "$(date +%s)" -ge "$KONIEC" ] && break
            sleep 300
          done
